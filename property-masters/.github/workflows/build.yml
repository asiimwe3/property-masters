name: Build & Sign APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/property-masters.jks
          echo "KEYSTORE_FILE=${{ github.workspace }}/property-masters.jks" >> $GITHUB_ENV

      - name: Set Signing Env Vars
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Create placeholder google-services.json
        working-directory: property-masters/app
        run: |
          if [ ! -f google-services.json ]; then
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.propertymasters.app"}},"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > google-services.json
          fi

      - name: Build Debug APK
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        working-directory: property-masters
        run: ./gradlew assembleDebug || gradle assembleDebug

      - name: Build Signed Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: property-masters
        run: ./gradlew assembleRelease || gradle assembleRelease

      - name: Upload Debug APK
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: property-masters-debug-apk
          path: property-masters/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: property-masters-release-apk
          path: property-masters/app/build/outputs/apk/release/*.apk
          retention-days: 30
