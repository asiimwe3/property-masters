  if(!email||!email.includes('@')){errEl.textContent='Please enter a valid email address.';errEl.classList.remove('hidden');return;}
  if(password.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.classList.remove('hidden');return;}
  errEl.classList.add('hidden');
  currentUser={email:email,name:email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase())};
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('topbarAvatar').textContent=currentUser.name.charAt(0).toUpperCase();
  navigate('home');
  showToast('Welcome to Property Masters, '+currentUser.name+'!');
}

function toggleAuth(){
  authMode=authMode==='signin'?'signup':'signin';
  document.querySelector('.auth-card h2').textContent=authMode==='signin'?'Property Masters':'Create Account';
  document.getElementById('authSubtitle').textContent=authMode==='signin'?'Sign in to your account':'Sign up for a new account';
  document.getElementById('btnAuth').textContent=authMode==='signin'?'Sign In':'Sign Up';
  document.getElementById('authToggle').innerHTML=authMode==='signin'?"Don't have an account? <a onclick=\"toggleAuth()\">Sign up</a>":"Already have an account? <a onclick=\"toggleAuth()\">Sign in</a>";
}

function navigate(screen){
  currentScreen=screen;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.screen===screen));
  const titles={home:'Home',properties:'Properties',brokers:'Brokers',jobs:'Jobs',account:'Account'};
  document.getElementById('topbarTitle').textContent=titles[screen]||screen;
  render();
}

function render(){
  const c=document.getElementById('content');
  if(currentScreen==='home')c.innerHTML=renderHome();
  else if(currentScreen==='properties')c.innerHTML=renderProperties();
  else if(currentScreen==='brokers')c.innerHTML=renderBrokers();
  else if(currentScreen==='jobs')c.innerHTML=renderJobs();
  else if(currentScreen==='account')c.innerHTML=renderAccount();
}

function renderHome(){
  const featured=properties.filter(p=>p.isFeatured);
  return `<div class="hero"><h1>Find Your Dream Property</h1><p>Browse thousands of listings, connect with top brokers, and discover the perfect place to call home.</p><div class="hero-search"><input type="text" placeholder="Search by city, neighborhood, or keyword..." onkeydown="if(event.key==='Enter')navigate('properties')"><select>${categories.map(c=>'<option value="'+c.name+'">'+c.name+'</option>').join('')}</select><button onclick="navigate('properties')">Search</button></div></div>
  <div class="section-title">Explore Categories</div>
  <div class="categories">${categories.map(c=>'<div class="category-card" onclick="filterByCategory(\''+c.name+'\')"><span class="icon">'+c.icon+'</span><span class="name">'+c.name+'</span></div>').join('')}</div>
  <div class="section-title">Featured Properties <a onclick="navigate(\'properties\')">View all →</a></div>
  <div class="featured">${featured.map(p=>'<div class="featured-card" onclick="showPropertyModal('+p.id+')"><img src="'+p.imageUrl+'" loading="lazy" onerror="this.src=\''+fallbackImg+'\'"><div class="info"><div class="title">'+p.title+'</div><div class="price">'+p.price+'</div><div class="meta">'+(p.beds>0?'<span>🛏 '+p.beds+' beds</span>':'')+(p.baths>0?'<span>🛁 '+p.baths+' baths</span>':'')+'</div><div class="location">📍 '+p.location+'</div></div></div>').join('')}</div>`;
}

function renderProperties(){
  let f=properties;
  if(currentFilter!=='All')f=f.filter(p=>p.category===currentFilter);
  if(searchQuery)f=f.filter(p=>p.title.toLowerCase().includes(searchQuery)||p.location.toLowerCase().includes(searchQuery)||p.category.toLowerCase().includes(searchQuery));
  return `<div class="filter-bar"><div class="filter-chip ${currentFilter==='All'?'active':''}" onclick="setFilter('All')">All</div>${categories.map(c=>'<div class="filter-chip '+(currentFilter===c.name?'active':'')+'" onclick="setFilter(\''+c.name+'\')">'+c.icon+' '+c.name+'</div>').join('')}</div>`+
  (f.length===0?'<div style="text-align:center;padding:60px;color:var(--text-muted);">No properties found'+(searchQuery?' for "'+searchQuery+'"':'')+'.</div>':
  '<div class="properties-grid">'+f.map(p=>'<div class="property-card" onclick="showPropertyModal('+p.id+')"><img src="'+p.imageUrl+'" loading="lazy" onerror="this.src=\''+fallbackImg+'\'"><div class="info"><div class="title">'+p.title+'</div><div class="price">'+p.price+'</div><div class="meta">'+(p.beds>0?'<span>🛏 '+p.beds+'</span>':'')+(p.baths>0?'<span>🛁 '+p.baths+'</span>':'')+'</div><div class="location">📍 '+p.location+'</div></div><div class="actions"><button class="btn-view" onclick="event.stopPropagation();showPropertyModal('+p.id+')">View Details</button></div></div>').join('')+'</div>');
}

function renderBrokers(){
  let f=brokers;
  if(searchQuery)f=f.filter(b=>b.name.toLowerCase().includes(searchQuery)||b.specialty.toLowerCase().includes(searchQuery)||b.title.toLowerCase().includes(searchQuery));
  return '<div class="brokers-list">'+f.map(b=>'<div class="broker-card"><img src="'+b.photoUrl+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect fill=%22%230F766E%22 width=%2264%22 height=%2264%22 rx=%2232%22/%3E%3Ctext x=%2232%22 y=%2240%22 font-size=%2224%22 fill=%22white%22 text-anchor=%22middle%22%3E'+b.name.charAt(0)+'%3C/text%3E%3C/svg%3E\'"><div class="info"><div class="name">'+b.name+'</div><div class="btitle">'+b.title+'</div><div class="specialty">'+b.specialty+'</div><div class="rating"><span class="star">★</span> '+b.rating+' <span class="reviews">('+b.reviewCount+' reviews)</span></div></div><button class="btn-contact" onclick="showToast(\'Contact request sent to '+b.name+'!\')">Contact</button></div>').join('')+'</div>';
}

function renderJobs(){
  let f=jobs;
  if(jobTab!=='All')f=f.filter(j=>j.category===jobTab);
  if(searchQuery)f=f.filter(j=>j.title.toLowerCase().includes(searchQuery)||j.company.toLowerCase().includes(searchQuery)||j.location.toLowerCase().includes(searchQuery));
  return `<div class="jobs-tabs"><div class="filter-chip ${jobTab==='All'?'active':''}" onclick="setJobTab('All')">All Jobs</div><div class="filter-chip ${jobTab==='Agents'?'active':''}" onclick="setJobTab('Agents')">Agents</div><div class="filter-chip ${jobTab==='Project Managers'?'active':''}" onclick="setJobTab('Project Managers')">Project Managers</div></div>`+
  '<div class="jobs-list">'+f.map(j=>'<div class="job-card"><div class="info"><div class="title">'+j.title+'</div><div class="company">'+j.company+' • '+j.location+'</div><div class="tags"><span class="tag">'+j.type+'</span><span class="tag">'+j.category+'</span><span class="tag salary">'+j.salary+'</span></div></div><button class="btn-apply" onclick="showToast(\'Application submitted for '+j.title+'!\')">Apply Now</button></div>').join('')+'</div>';
}

function renderAccount(){
  const menuItems=[{label:"My Listings",icon:"🏠"},{label:"Favorites",icon:"❤️"},{label:"Saved Searches",icon:"🔍"},{label:"Contact Support",icon:"☎️"},{label:"Privacy Policy",icon:"📄"},{label:"About",icon:"ℹ️"}];
  return '<div class="account-container"><div class="account-header"><div class="avatar-lg">'+(currentUser?currentUser.name.charAt(0).toUpperCase():'U')+'</div><div><div class="name">'+(currentUser?currentUser.name:'User')+'</div><div class="email">'+(currentUser?currentUser.email:'guest@propertymasters.app')+'</div><div class="badge">✓ Verified Agent</div></div></div><div class="account-menu">'+menuItems.map(m=>'<div class="account-menu-item" onclick="showToast(\''+m.label+' — coming soon!\')"><span class="icon">'+m.icon+'</span><span>'+m.label+'</span></div>').join('')+'<div class="account-menu-item danger" onclick="logout()"><span class="icon">🚪</span><span>Logout</span></div></div></div>';
}

function showPropertyModal(id){
  const p=properties.find(x=>x.id===id);if(!p)return;
  document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">✕</button><img class="hero-img" src="'+p.imageUrl+'" onerror="this.src=\''+fallbackImg+'\'"><div class="modal-body"><h2>'+p.title+'</h2><div class="price">'+p.price+'</div><div class="specs">'+(p.beds>0?'<div class="spec"><div class="num">'+p.beds+'</div><div class="label">Bedrooms</div></div>':'')+(p.baths>0?'<div class="spec"><div class="num">'+p.baths+'</div><div class="label">Bathrooms</div></div>':'')+'<div class="spec"><div class="num">📍</div><div class="label">'+p.location+'</div></div></div><div class="desc">Beautiful '+p.category.toLowerCase().replace(/s$/,'')+' located in '+p.location+'. This property features '+p.beds+' bedroom'+(p.beds!==1?'s':'')+' and '+p.baths+' bathroom'+(p.baths!==1?'s':'')+', offering modern amenities and a prime location. Contact one of our verified brokers to schedule a viewing today.</div><button class="btn-contact-agent" onclick="closeModal();showToast(\'A broker will contact you about '+p.title+' shortly!\')">Contact Agent</button></div></div></div>';
}

function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modalContainer').innerHTML='';}
function setFilter(c){currentFilter=c;render();}
function setJobTab(t){jobTab=t;render();}
function filterByCategory(c){currentFilter=c;navigate('properties');}
function handleSearch(v){searchQuery=v.toLowerCase().trim();if(currentScreen==='home')return;render();}
function showToast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',3000);}
function logout(){currentUser=null;document.getElementById('app').classList.add('hidden');document.getElementById('authScreen').classList.remove('hidden');document.getElementById('authEmail').value='';document.getElementById('authPassword').value='';authMode='signin';toggleAuth();toggleAuth();}

document.getElementById('authPassword').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
document.getElementById('authEmail').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('authPassword').focus();});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
